<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
  @for (recipe of recipes; track recipe.id) {
    <mat-card class="recipe-card" (click)="onRecipeClick(recipe.id)">
      @if (recipe.imageUrl) {
        <img mat-card-image [src]="recipe.imageUrl" [alt]="recipe.title">
      }
      <mat-card-header>
        <mat-card-title>{{ recipe.title }}</mat-card-title>
        <mat-card-subtitle>
          {{ recipe.prepTime + recipe.cookTime }} mins • {{ recipe.servings }} servings
        </mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p class="line-clamp-2">{{ recipe.description }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button color="primary">VIEW RECIPE</button>
      </mat-card-actions>
    </mat-card>
  }
</div>
